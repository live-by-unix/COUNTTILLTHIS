<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CountTillThis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="https://cdn.jsdelivr.net/gh/twitter/twemoji@14.0.2/assets/svg/23f0.svg">
<style>
:root{
  --bg-light:#f2f2f2;
  --bg-dark:#111;
  --text-light:#111;
  --text-dark:#fff;
  --card-light:rgba(255,255,255,0.9);
  --card-dark:rgba(0,0,0,0.85);
  --border-light:rgba(0,0,0,0.1);
  --border-dark:rgba(255,255,255,0.15);
  --accent:#3b82f6;
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,sans-serif;
  background:var(--bg-light);
  color:var(--text-light);
  min-height:100vh;
  transition:.2s;
  position:relative;
  overflow-x:hidden;
}
body.dark{
  background:var(--bg-dark);
  color:var(--text-dark);
}
body.dark *{
  color:#fff!important;
  text-shadow:0 0 6px rgba(0,0,0,0.9);
}
.bg-layer{
  position:fixed;
  inset:0;
  background:#777 center/cover no-repeat;
  z-index:0; /* FIX: was -1, now visible */
}
.wrap{
  max-width:900px;
  margin:0 auto;
  padding:20px;
  position:relative;
  z-index:1;
}
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}
.toggle{
  padding:6px 12px;
  border-radius:20px;
  border:1px solid var(--border-light);
  cursor:pointer;
  font-size:13px;
  background:rgba(255,255,255,0.7);
  transition:.15s;
}
.toggle:hover{transform:scale(1.05);}
.toggle:active{transform:scale(0.95);}
body.dark .toggle{
  border-color:var(--border-dark);
  background:rgba(0,0,0,0.6);
}
.card{
  background:var(--card-light);
  border:1px solid var(--border-light);
  border-radius:16px;
  padding:20px;
  backdrop-filter:blur(12px);
}
body.dark .card{
  background:var(--card-dark);
  border-color:var(--border-dark);
}
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}
@media(max-width:700px){
  .grid{grid-template-columns:1fr;}
}
.field label{
  font-size:12px;
  opacity:.7;
}
.field input{
  width:100%;
  padding:8px;
  border-radius:10px;
  border:1px solid var(--border-light);
  background:rgba(255,255,255,0.9);
  margin-top:4px;
}
body.dark .field input{
  background:rgba(0,0,0,0.4);
  border-color:var(--border-dark);
}
.btn{
  padding:10px 18px;
  border-radius:20px;
  border:none;
  background:var(--accent);
  color:#fff;
  cursor:pointer;
  font-size:14px;
  transition:.15s;
}
.btn:hover{transform:scale(1.05);}
.btn:active{transform:scale(0.95);}
.countgrid{
  width:100%;
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
@media(max-width:700px){
  .countgrid{grid-template-columns:repeat(2,1fr);}
}
.block{
  text-align:center;
  padding:12px;
  border-radius:14px;
  border:1px solid var(--border-light);
  background:rgba(0,0,0,0.05);
}
body.dark .block{
  background:rgba(255,255,255,0.05);
  border-color:var(--border-dark);
}
.label{
  font-size:11px;
  opacity:.7;
}
.val{
  font-size:24px;
  font-weight:600;
}
.hidden{display:none;}
.copybtn{
  padding:8px 14px;
  border-radius:20px;
  border:1px solid var(--border-light);
  background:transparent;
  cursor:pointer;
  font-size:13px;
  transition:.15s;
  margin-top:10px;
  margin-right:6px;
}
.copybtn:hover{transform:scale(1.05);}
.copybtn:active{transform:scale(0.95);}
body.dark .copybtn{
  border-color:var(--border-dark);
}
.progress-wrap{
  width:100%;
  height:10px;
  background:rgba(0,0,0,0.15);
  border-radius:10px;
  margin-top:20px;
  overflow:hidden;
}
body.dark .progress-wrap{
  background:rgba(255,255,255,0.2);
}
.progress-bar{
  height:100%;
  width:0%;
  background:var(--accent);
  transition:width .05s linear;
}
</style>
</head>

<body>
<div class="bg-layer" id="bgLayer"></div>

<div class="wrap">
  <div class="top">
    <div style="font-weight:700;letter-spacing:.08em;">COUNTTILLTHIS</div>
    <div class="toggle" id="modeToggle">🌙 Dark</div>
  </div>

  <div class="card" id="builder">
    <h2>Create a countdown</h2>
    <div class="grid">
      <div>
        <div class="field"><label>Countdown name</label><input id="title"></div>
        <div class="field"><label>Year</label><input id="y"></div>
        <div class="field"><label>Month</label><input id="mo"></div>
        <div class="field"><label>Day</label><input id="d"></div>
        <div class="field"><label>Hour</label><input id="h"></div>
        <div class="field"><label>Minute</label><input id="mi"></div>
        <div class="field"><label>Second</label><input id="s"></div>
        <div class="field"><label>Milliseconds *</label><input id="ms" required></div>
      </div>
      <div>
        <div class="field"><label>Background image</label><input type="file" id="bg" accept="image/*"></div>
        <button class="btn" id="start">Start timer</button>
        <div id="err" style="color:#e33;font-size:12px;margin-top:8px;"></div>
      </div>
    </div>
  </div>

  <div class="card hidden" id="countview">
    <h2 id="ctitle"></h2>
    <h3 id="target"></h3>

    <div class="countgrid">
      <div class="block"><div class="label">Years</div><div class="val" id="vy">0</div></div>
      <div class="block"><div class="label">Months</div><div class="val" id="vmo">0</div></div>
      <div class="block"><div class="label">Days</div><div class="val" id="vd">0</div></div>
      <div class="block"><div class="label">Hours</div><div class="val" id="vh">0</div></div>
      <div class="block"><div class="label">Minutes</div><div class="val" id="vmi">0</div></div>
      <div class="block"><div class="label">Seconds</div><div class="val" id="vs">0</div></div>
      <div class="block"><div class="label">Milliseconds</div><div class="val" id="vms">000</div></div>
      <div class="block"><div class="label">Status</div><div class="val" id="stat">Running</div></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress"></div>
    </div>

    <div>
      <button class="copybtn" id="copy">Copy URL</button>
      <button class="copybtn" id="new">New timer</button>
    </div>
  </div>
</div>

<script>
let modeToggle=document.getElementById("modeToggle");
modeToggle.onclick=()=>{
  document.body.classList.toggle("dark");
  modeToggle.textContent=document.body.classList.contains("dark")?"☀️ Light":"🌙 Dark";
};

let y=document.getElementById("y"),
    mo=document.getElementById("mo"),
    d=document.getElementById("d"),
    h=document.getElementById("h"),
    mi=document.getElementById("mi"),
    s=document.getElementById("s"),
    ms=document.getElementById("ms"),
    title=document.getElementById("title"),
    bgInput=document.getElementById("bg"),
    bgLayer=document.getElementById("bgLayer"),
    builder=document.getElementById("builder"),
    countview=document.getElementById("countview"),
    progress=document.getElementById("progress"),
    err=document.getElementById("err");

let timer=null;
let targetTime=0;
let totalDuration=0;

function gi(v){
  let n=parseInt(v.value);
  return isNaN(n)?null:n;
}

function buildDate(){
  let n=new Date();
  let Y=gi(y)??n.getFullYear();
  let M=gi(mo)??(n.getMonth()+1);
  let D=gi(d)??n.getDate();
  let H=gi(h)??n.getHours();
  let MI=gi(mi)??n.getMinutes();
  let S=gi(s)??n.getSeconds();
  let MS=gi(ms);
  if(MS===null) throw "Milliseconds required";
  return new Date(Y,M-1,D,H,MI,S,MS);
}

function autoResize(img){
  let w=img.width, h=img.height;
  let max=Math.max(w,h);
  let target=1024;
  if(max>1024 && max<=1920) target=1920;
  else if(max>1920 && max<=3840) target=2560;
  else if(max>3840) target=3200;
  let scale=target/max;
  let cw=w*scale, ch=h*scale;
  let c=document.createElement("canvas");
  c.width=cw; c.height=ch;
  let ctx=c.getContext("2d");
  ctx.drawImage(img,0,0,cw,ch);
  return c.toDataURL("image/jpeg",0.85);
}

function encodeURL(targetISO,imgData,name){
  let u=new URL(location.href);
  u.search="";
  if(imgData) u.searchParams.set("img", encodeURIComponent(imgData));
  u.searchParams.set("t", targetISO);
  if(name) u.searchParams.set("name", name);
  return u.toString();
}

function showBackground(imgParam){
  if(!imgParam){
    bgLayer.style.backgroundImage="none";
    return;
  }
  let data;
  try{
    data=decodeURIComponent(imgParam);
  }catch(e){
    bgLayer.style.backgroundImage="none";
    return;
  }
  if(data){
    bgLayer.style.backgroundImage="url('"+data+"')";
  }else{
    bgLayer.style.backgroundImage="none";
  }
}

function showCountdown(target,imgParam,name){
  builder.classList.add("hidden");
  countview.classList.remove("hidden");

  showBackground(imgParam);

  document.getElementById("ctitle").textContent=name||"Countdown";
  document.getElementById("target").textContent="To "+target.toLocaleString();

  targetTime=target.getTime();
  totalDuration=targetTime - Date.now();

  function tick(){
    let remaining=targetTime - Date.now();
    if(remaining<=0){
      cancelAnimationFrame(timer);
      progress.style.width="100%";
      document.getElementById("vy").textContent="0";
      document.getElementById("vmo").textContent="0";
      document.getElementById("vd").textContent="0";
      document.getElementById("vh").textContent="0";
      document.getElementById("vmi").textContent="0";
      document.getElementById("vs").textContent="0";
      document.getElementById("vms").textContent="000";
      document.getElementById("stat").textContent="Arrived";
      return;
    }

    let diff=new Date(remaining);
    document.getElementById("vy").textContent=diff.getUTCFullYear()-1970;
    document.getElementById("vmo").textContent=diff.getUTCMonth();
    document.getElementById("vd").textContent=diff.getUTCDate()-1;
    document.getElementById("vh").textContent=diff.getUTCHours();
    document.getElementById("vmi").textContent=diff.getUTCMinutes();
    document.getElementById("vs").textContent=diff.getUTCSeconds();
    document.getElementById("vms").textContent=diff.getUTCMilliseconds().toString().padStart(3,"0");

    let progressPercent=((totalDuration-remaining)/totalDuration)*100;
    if(progressPercent<0) progressPercent=0;
    if(progressPercent>100) progressPercent=100;
    progress.style.width=progressPercent+"%";

    timer=requestAnimationFrame(tick);
  }

  timer=requestAnimationFrame(tick);
}

document.getElementById("start").onclick=()=>{
  err.textContent="";
  let target;
  try{
    target=buildDate();
  }catch(e){
    err.textContent=e;
    return;
  }

  let name=title.value.trim();
  let file=bgInput.files[0];

  if(file){
    let reader=new FileReader();
    reader.onload=(ev)=>{
      let raw=ev.target.result;
      if(!raw){
        err.textContent="Could not read image.";
        return;
      }
      let img=new Image();
      img.onload=()=>{
        let resizedData=autoResize(img);
        bgLayer.style.backgroundImage="url('"+resizedData+"')"; 
        let url=encodeURL(target.toISOString(),resizedData,name);
        history.replaceState(null,"",url);
        let params=new URLSearchParams(location.search);
        showCountdown(target,params.get("img")||"",name);
      };
      img.onerror=()=>{
        err.textContent="Invalid image file.";
      };
      img.src=raw;
    };
    reader.onerror=()=>{
      err.textContent="Error reading image file.";
    };
    reader.readAsDataURL(file);
  }else{
    let url=encodeURL(target.toISOString(),"",name);
    history.replaceState(null,"",url);
    showCountdown(target,"",name);
  }
};

document.getElementById("copy").onclick=()=>navigator.clipboard.writeText(location.href);
document.getElementById("new").onclick=()=>{
  history.replaceState(null,"",location.pathname);
  location.reload();
};

window.addEventListener("DOMContentLoaded",()=>{
  let p=new URLSearchParams(location.search);
  if(p.has("t")){
    let t=new Date(p.get("t"));
    let img=p.get("img")||"";
    let name=p.get("name")||"Countdown";
    showCountdown(t,img,name);
  }
});
</script>
</body>
</html>
