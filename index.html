<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CountTillThis</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body {
  margin:0;
  font-family:system-ui;
  background:#111;
  color:white;
  overflow:hidden;
}
.bg {
  position:fixed;
  inset:0;
  z-index:-1;
  background-size:cover;
  background-position:center;
}
video.bg {
  object-fit:cover;
  width:100%;
  height:100%;
}
.blur {
  backdrop-filter:blur(12px);
}
.card {
  background:rgba(0,0,0,0.5);
  padding:20px;
  border-radius:12px;
  max-width:600px;
  margin:20px auto;
}
.hidden { display:none; }
.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
}
.val { font-size:32px; font-weight:700; }
</style>
</head>

<body>

<div id="bgImage" class="bg"></div>
<video id="bgVideo" class="bg" autoplay muted loop playsinline></video>

<div id="builder" class="card">
  <h2>Create Countdown</h2>
  <label>Name <input id="name"></label><br><br>
  <label>Year <input id="y"></label><br>
  <label>Month <input id="mo"></label><br>
  <label>Day <input id="d"></label><br>
  <label>Hour <input id="h"></label><br>
  <label>Minute <input id="mi"></label><br>
  <label>Second <input id="s"></label><br>
  <label>Milliseconds <input id="ms"></label><br><br>

  <label>Background <input type="file" id="bgFile" accept="image/*,video/*"></label><br><br>

  <label><input type="checkbox" id="blur"> Blur overlay</label><br><br>

  <button id="start">Start</button>
</div>

<div id="count" class="card hidden">
  <h2 id="ctitle"></h2>
  <h3 id="target"></h3>

  <div class="grid">
    <div><div class="val" id="vy">0</div>Years</div>
    <div><div class="val" id="vmo">0</div>Months</div>
    <div><div class="val" id="vd">0</div>Days</div>
    <div><div class="val" id="vh">0</div>Hours</div>
    <div><div class="val" id="vmi">0</div>Minutes</div>
    <div><div class="val" id="vs">0</div>Seconds</div>
    <div><div class="val" id="vms">000</div>MS</div>
  </div>

  <button onclick="navigator.clipboard.writeText(location.href)">Copy URL</button>
  <button onclick="location.href='/'">New</button>
</div>

<script>
function loadBackgroundFromHash() {
  const hash = location.hash.slice(1);
  if (!hash.startsWith("BG:")) return;

  const data = hash.slice(3);

  if (data.startsWith("data:video/")) {
    bgVideo.src = data;
    bgVideo.style.display = "block";
    bgImage.style.display = "none";
  } else {
    bgImage.style.backgroundImage = `url(${data})`;
    bgImage.style.display = "block";
    bgVideo.style.display = "none";
  }
}

function startCountdown(target) {
  function tick() {
    const now = Date.now();
    let diff = target - now;
    if (diff < 0) diff = 0;

    const d = new Date(diff);
    vy.textContent = d.getUTCFullYear() - 1970;
    vmo.textContent = d.getUTCMonth();
    vd.textContent = d.getUTCDate() - 1;
    vh.textContent = d.getUTCHours();
    vmi.textContent = d.getUTCMinutes();
    vs.textContent = d.getUTCSeconds();
    vms.textContent = d.getUTCMilliseconds().toString().padStart(3,"0");

    requestAnimationFrame(tick);
  }
  tick();
}

start.onclick = () => {
  const Y = +y.value;
  const M = +mo.value - 1;
  const D = +d.value;
  const H = +h.value;
  const MI = +mi.value;
  const S = +s.value;
  const MS = +ms.value;

  const target = new Date(Y,M,D,H,MI,S,MS);

  const nameVal = name.value;
  const blurVal = blur.checked ? "1" : "0";

  const file = bgFile.files[0];
  if (file) {
    const r = new FileReader();
    r.onload = e => {
      const data = e.target.result;
      const url = new URL(location.href);
      url.search = "";
      url.searchParams.set("t", target.toISOString());
      url.searchParams.set("name", nameVal);
      url.searchParams.set("blur", blurVal);
      location.href = url.toString() + "#BG:" + data;
    };
    r.readAsDataURL(file);
  } else {
    const url = new URL(location.href);
    url.search = "";
    url.searchParams.set("t", target.toISOString());
    url.searchParams.set("name", nameVal);
    url.searchParams.set("blur", blurVal);
    location.href = url.toString();
  }
};

window.onload = () => {
  const p = new URLSearchParams(location.search);
  if (!p.has("t")) return;

  builder.classList.add("hidden");
  count.classList.remove("hidden");

  const target = new Date(p.get("t"));
  ctitle.textContent = p.get("name");
  targetEl.textContent = target.toLocaleString();

  if (p.get("blur") === "1") document.body.classList.add("blur");

  loadBackgroundFromHash();
  startCountdown(target);
};
</script>

</body>
</html>
